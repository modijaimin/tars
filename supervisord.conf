[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:signal-cli]
command=signal-cli --config /data/signal-cli daemon --http --http-port 7583 --http-host 127.0.0.1 --receive-mode on-start
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:fastapi]
command=uvicorn server.main:app --host 0.0.0.0 --port 8000 --workers 1
directory=/app
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
